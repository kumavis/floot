<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Floot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f10;
      --surface: #17171a;
      --surface2: #1f1f23;
      --surface3: #26262b;
      --border: #2a2a2e;
      --border-strong: #3a3a40;
      --text: #e4e4e7;
      --text-muted: #8a8a92;
      --text-faint: #5e5e66;
      --user-bubble: #2563eb;
      --user-text: #ffffff;
      --assistant-bubble: #27272a;
      --accent: #3b82f6;
      --red: #ef4444;
      --green: #22c55e;
      --tool: #a78bfa;
      --tool-result: #86efac;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
    }

    /* ----- Sidebar ----- */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .sidebar-header {
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .sidebar-title {
      font-size: 0.95rem;
      font-weight: 600;
      flex: 1;
    }

    .new-session-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0.4rem 0.7rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .new-session-btn:hover { background: #2563eb; }
    .new-session-btn svg { width: 14px; height: 14px; }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.4rem;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .session-empty {
      color: var(--text-faint);
      font-size: 0.8rem;
      padding: 1rem 0.5rem;
      text-align: center;
    }

    .session-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.6rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
    }

    .session-item:hover { background: var(--surface2); }
    .session-item.active { background: var(--surface3); }
    .session-item.active .session-title { color: var(--text); }

    .session-status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-faint);
    }

    .session-status-dot.streaming { background: var(--accent); animation: pulse-dot 1.4s infinite; }
    .session-status-dot.transcribing { background: var(--accent); animation: pulse-dot 1.4s infinite; }
    .session-status-dot.error { background: var(--red); }

    @keyframes pulse-dot {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .session-title {
      font-size: 0.85rem;
      color: var(--text-muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-delete-btn {
      background: transparent;
      border: none;
      color: var(--text-faint);
      cursor: pointer;
      padding: 2px;
      border-radius: 4px;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .session-item:hover .session-delete-btn { display: flex; }
    .session-delete-btn:hover { color: var(--red); background: rgba(239, 68, 68, 0.1); }
    .session-delete-btn svg { width: 14px; height: 14px; }

    /* ----- Main column ----- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 0.5rem;
    }

    .header-title {
      font-size: 0.95rem;
      font-weight: 600;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .header-title.empty { color: var(--text-faint); font-weight: 400; }

    .header-controls { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }

    .mic-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.75rem;
      padding: 0.3rem 0.5rem;
      max-width: 200px;
      outline: none;
    }

    .mic-select:focus { border-color: var(--accent); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      scroll-behavior: smooth;
    }

    .empty-state {
      margin: auto;
      text-align: center;
      color: var(--text-faint);
      font-size: 0.9rem;
      padding: 2rem;
    }

    .empty-state .hint { font-size: 0.8rem; margin-top: 0.5rem; color: var(--text-faint); }

    .msg-row {
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.15s ease;
    }

    .msg-row.user { align-items: flex-end; }
    .msg-row.assistant { align-items: flex-start; }

    .msg {
      max-width: 80%;
      padding: 0.6rem 0.9rem;
      border-radius: 16px;
      font-size: 0.9375rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user .msg {
      background: var(--user-bubble);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .msg-row.assistant .msg {
      background: var(--assistant-bubble);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .msg-row.assistant .msg.playing {
      outline: 1px solid var(--green);
      outline-offset: -1px;
    }

    .msg-row.assistant.streaming .msg::after {
      content: "";
      display: inline-block;
      width: 6px;
      height: 1em;
      background: var(--text-muted);
      vertical-align: text-bottom;
      margin-left: 2px;
      animation: caret 1s steps(2) infinite;
    }

    @keyframes caret {
      50% { opacity: 0; }
    }

    .play-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 6px;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      gap: 3px;
      margin-top: 2px;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .play-btn:hover { color: var(--text); }
    .play-btn.playing { color: var(--green); }
    .play-btn svg { width: 12px; height: 12px; }

    .msg-row.error { align-items: center; }
    .msg-row.error .msg {
      background: transparent;
      color: var(--red);
      font-size: 0.8rem;
    }

    .tool-block {
      max-width: 80%;
      align-self: flex-start;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 10px;
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      font-family: "SF Mono", "Fira Code", monospace;
      color: var(--tool);
      animation: fadeIn 0.15s ease;
    }

    .tool-block .tool-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #7c6fbf;
      margin-bottom: 0.25rem;
    }

    .tool-block pre {
      white-space: pre-wrap;
      word-break: break-all;
      margin: 0;
      color: #c4b5fd;
      max-height: 150px;
      overflow-y: auto;
    }

    .tool-block.result {
      background: #1a2e1a;
      border-color: #2a3e2a;
      color: var(--tool-result);
    }

    .tool-block.result .tool-label { color: #4ade80; }
    .tool-block.result pre { color: #bbf7d0; }

    .status-bar {
      padding: 0.25rem 1rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--surface);
      border-top: 1px solid var(--border);
      min-height: 1.6rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .status-bar.error { color: var(--red); }

    .input-bar {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      padding: 0.6rem 0.75rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .text-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-size: 0.9375rem;
      padding: 0.55rem 1rem;
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
      font-family: inherit;
    }

    .text-input::placeholder { color: var(--text-muted); }
    .text-input:focus { border-color: var(--accent); }
    .text-input:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s ease;
    }

    .send-btn { background: var(--accent); color: white; }
    .send-btn:hover { background: #2563eb; }
    .send-btn:disabled { opacity: 0.3; cursor: default; }

    .mic-btn {
      background: var(--surface2);
      border: 2px solid var(--border);
      color: var(--text-muted);
    }

    .mic-btn:hover { border-color: var(--text-muted); }
    .mic-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: var(--border); }

    .mic-btn.listening {
      border-color: var(--green);
      color: var(--green);
    }

    .mic-btn.speaking {
      border-color: var(--green);
      color: var(--green);
      animation: pulse 1.5s ease infinite;
    }

    .mic-btn.muted {
      border-color: var(--border);
      color: var(--text-muted);
      opacity: 0.5;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.3); }
      50% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
    }

    .mic-btn svg, .send-btn svg { width: 20px; height: 20px; }

    .volume-bar {
      height: 3px;
      background: var(--border);
      flex-shrink: 0;
      overflow: hidden;
    }

    .volume-bar-fill {
      height: 100%;
      width: 0%;
      background: var(--green);
      transition: width 0.08s linear;
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Sessions</span>
      <button id="newSessionBtn" class="new-session-btn" title="New session">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New
      </button>
    </div>
    <div class="session-list" id="sessionList"></div>
  </aside>

  <main class="main">
    <div class="header">
      <span class="header-title" id="headerTitle">Floot</span>
      <div class="header-controls">
        <select id="micSelect" class="mic-select">
          <option value="">Loading devices...</option>
        </select>
      </div>
    </div>

    <div class="messages" id="messages"></div>
    <div class="volume-bar"><div class="volume-bar-fill" id="volumeFill"></div></div>
    <div class="status-bar" id="statusBar"></div>

    <div class="input-bar">
      <textarea class="text-input" id="textInput" placeholder="Type a message..." rows="1" disabled></textarea>
      <button class="btn mic-btn" id="micBtn" title="Toggle microphone" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button class="btn send-btn" id="sendBtn" title="Send message" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </main>

  <script>
    const sessionListEl = document.getElementById("sessionList");
    const newSessionBtn = document.getElementById("newSessionBtn");
    const headerTitle = document.getElementById("headerTitle");
    const messagesEl = document.getElementById("messages");
    const statusBar = document.getElementById("statusBar");
    const textInput = document.getElementById("textInput");
    const sendBtn = document.getElementById("sendBtn");
    const micBtn = document.getElementById("micBtn");
    const micSelect = document.getElementById("micSelect");
    const volumeFill = document.getElementById("volumeFill");

    const PLAY_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
    const STOP_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
    const DELETE_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>';

    // ----- Client state (mirrors server) -----
    const state = {
      sessions: [],
      detail: null,
      connected: false,
    };

    // Local UI memory
    let autoplayedAssistantIds = new Set();
    let prevDetailKey = null; // sessionId + status fingerprint

    let ws = null;

    function send(cmd) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(cmd));
      }
    }

    function connectWebSocket() {
      const protocol = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(`${protocol}//${location.host}`);
      ws.onopen = () => {
        state.connected = true;
        setStatus("Connected");
      };
      ws.onmessage = (event) => {
        if (typeof event.data !== "string") return;
        let data;
        try { data = JSON.parse(event.data); } catch { return; }
        dispatch(data);
      };
      ws.onclose = () => {
        state.connected = false;
        setStatus("Disconnected. Reconnecting...");
        autoplayedAssistantIds.clear();
        setTimeout(connectWebSocket, 2000);
      };
      ws.onerror = () => { try { ws.close(); } catch {} };
    }

    function dispatch(event) {
      switch (event.type) {
        case "state/init":
          state.sessions = event.sessions || [];
          state.detail = event.detail || null;
          renderSidebar();
          renderChat();
          break;
        case "state/sessions_updated":
          state.sessions = event.sessions || [];
          renderSidebar();
          break;
        case "state/session_updated":
          state.detail = event.detail || null;
          renderChat();
          break;
        case "state/error":
          setStatus(event.message || "Unknown error", true);
          break;
      }
    }

    // ----- Sidebar rendering -----
    function renderSidebar() {
      sessionListEl.innerHTML = "";

      if (state.sessions.length === 0) {
        const empty = document.createElement("div");
        empty.className = "session-empty";
        empty.textContent = "No sessions yet";
        sessionListEl.appendChild(empty);
        return;
      }

      for (const s of state.sessions) {
        const item = document.createElement("div");
        item.className = "session-item";
        if (state.detail && state.detail.id === s.id) item.classList.add("active");

        const dot = document.createElement("span");
        dot.className = "session-status-dot";
        if (s.status && s.status !== "idle") dot.classList.add(s.status);
        item.appendChild(dot);

        const title = document.createElement("span");
        title.className = "session-title";
        title.textContent = s.title || "Untitled";
        item.appendChild(title);

        const del = document.createElement("button");
        del.className = "session-delete-btn";
        del.title = "Delete session";
        del.innerHTML = DELETE_SVG;
        del.addEventListener("click", (e) => {
          e.stopPropagation();
          if (confirm(`Delete session "${s.title || "Untitled"}"?`)) {
            send({ type: "session/delete", sessionId: s.id });
          }
        });
        item.appendChild(del);

        item.addEventListener("click", () => {
          if (state.detail && state.detail.id === s.id) return;
          send({ type: "session/select", sessionId: s.id });
        });

        sessionListEl.appendChild(item);
      }
    }

    // ----- Chat rendering -----
    function renderChat() {
      const detail = state.detail;
      const detailKey = detail ? `${detail.id}:${detail.status}` : "none";
      const sessionChanged =
        !prevDetailKey || !detail || prevDetailKey.split(":")[0] !== detail.id;
      prevDetailKey = detailKey;

      if (sessionChanged) {
        autoplayedAssistantIds = new Set();
        stopTTS();
      }

      if (!detail) {
        headerTitle.textContent = "Floot";
        headerTitle.classList.add("empty");
        messagesEl.innerHTML = "";
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No session selected.";
        const hint = document.createElement("div");
        hint.className = "hint";
        hint.textContent = "Create a new session from the sidebar to start chatting.";
        empty.appendChild(hint);
        messagesEl.appendChild(empty);
        textInput.disabled = true;
        sendBtn.disabled = true;
        micBtn.disabled = true;
        setStatus("");
        return;
      }

      headerTitle.textContent = detail.title || "Untitled";
      headerTitle.classList.remove("empty");

      const wasNearBottom = isNearBottom();
      messagesEl.innerHTML = "";

      const messages = detail.messages || [];
      for (let i = 0; i < messages.length; i++) {
        const msg = messages[i];
        const isLast = i === messages.length - 1;
        renderMessage(msg, detail.status, isLast);
      }

      if (wasNearBottom || sessionChanged) {
        scrollToBottom();
      }

      const streaming = detail.status === "streaming" || detail.status === "transcribing";
      textInput.disabled = streaming;
      sendBtn.disabled = streaming || !textInput.value.trim();
      micBtn.disabled = false;

      if (detail.status === "transcribing") {
        setStatus("Transcribing audio...");
      } else if (detail.status === "streaming") {
        setStatus("Assistant is responding...");
      } else if (detail.status === "error" && detail.lastError) {
        setStatus(detail.lastError, true);
      } else {
        setStatus("");
      }

      maybeAutoplayLatestAssistant(detail);
    }

    function renderMessage(msg, sessionStatus, isLast) {
      switch (msg.kind) {
        case "user_text":
          appendBubble("user", msg.text);
          break;
        case "assistant_text": {
          const isStreaming = isLast && sessionStatus === "streaming";
          appendAssistantBubble(msg.id, msg.text, isStreaming);
          break;
        }
        case "tool_call":
          appendToolBlock(msg.toolName, msg.text, false);
          break;
        case "tool_result":
          appendToolBlock(msg.toolName, msg.text, true);
          break;
        case "error":
          appendError(msg.text);
          break;
      }
    }

    function appendBubble(role, text) {
      const row = document.createElement("div");
      row.className = `msg-row ${role}`;
      const msg = document.createElement("div");
      msg.className = "msg";
      msg.textContent = text;
      row.appendChild(msg);
      messagesEl.appendChild(row);
    }

    function appendAssistantBubble(msgId, text, streaming) {
      const row = document.createElement("div");
      row.className = "msg-row assistant";
      if (streaming) row.classList.add("streaming");
      row.dataset.msgId = msgId;

      const msgEl = document.createElement("div");
      msgEl.className = "msg";
      msgEl.textContent = text;
      row.appendChild(msgEl);

      if (!streaming && text.trim()) {
        const playBtn = document.createElement("button");
        playBtn.className = "play-btn";
        playBtn.innerHTML = PLAY_SVG + " Play";
        playBtn.addEventListener("click", () => {
          if (ttsPlaying && currentPlayBtn === playBtn) {
            stopTTS();
            unmuteMicAfterPlayback();
          } else {
            playTTSFromUrl(`/api/tts/${msgId}`, playBtn, msgEl);
          }
        });
        row.appendChild(playBtn);
      }

      messagesEl.appendChild(row);
    }

    function appendToolBlock(toolName, content, isResult) {
      const block = document.createElement("div");
      block.className = "tool-block" + (isResult ? " result" : "");
      const label = document.createElement("div");
      label.className = "tool-label";
      label.textContent = (toolName || "tool") + (isResult ? " result" : "");
      block.appendChild(label);
      const pre = document.createElement("pre");
      pre.textContent = content;
      block.appendChild(pre);
      messagesEl.appendChild(block);
    }

    function appendError(text) {
      const row = document.createElement("div");
      row.className = "msg-row error";
      const msg = document.createElement("div");
      msg.className = "msg";
      msg.textContent = text;
      row.appendChild(msg);
      messagesEl.appendChild(row);
    }

    function setStatus(text, isError) {
      statusBar.textContent = text || "";
      statusBar.classList.toggle("error", !!isError);
    }

    function isNearBottom() {
      return (
        messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 80
      );
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    function maybeAutoplayLatestAssistant(detail) {
      if (detail.status !== "idle") return;
      const messages = detail.messages || [];
      for (let i = messages.length - 1; i >= 0; i--) {
        const m = messages[i];
        if (m.kind === "assistant_text" && m.text.trim()) {
          if (!autoplayedAssistantIds.has(m.id)) {
            autoplayedAssistantIds.add(m.id);
            const row = messagesEl.querySelector(`.msg-row[data-msg-id="${m.id}"]`);
            const playBtn = row ? row.querySelector(".play-btn") : null;
            const msgEl = row ? row.querySelector(".msg") : null;
            playTTSFromUrl(`/api/tts/${m.id}`, playBtn, msgEl);
          }
          return;
        }
        if (m.kind === "user_text") return;
      }
    }

    // ----- TTS playback -----
    let ttsAudioCtx = null;
    let ttsSource = null;
    let ttsPlaying = false;
    let currentPlayBtn = null;
    let currentPlayMsgEl = null;
    let micWasListening = false;

    function getAudioContext() {
      if (!ttsAudioCtx || ttsAudioCtx.state === "closed") {
        ttsAudioCtx = new AudioContext();
      }
      return ttsAudioCtx;
    }

    async function playTTSFromUrl(url, playBtn, msgEl) {
      stopTTS();

      try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const arrayBuf = await resp.arrayBuffer();

        const ctx = getAudioContext();
        if (ctx.state === "suspended") await ctx.resume();

        const audioBuf = await ctx.decodeAudioData(arrayBuf);

        muteMicForPlayback();

        ttsSource = ctx.createBufferSource();
        ttsSource.buffer = audioBuf;
        ttsSource.connect(ctx.destination);

        ttsPlaying = true;
        currentPlayBtn = playBtn;
        currentPlayMsgEl = msgEl;

        if (playBtn) {
          playBtn.innerHTML = STOP_SVG + " Playing";
          playBtn.classList.add("playing");
        }
        if (msgEl) msgEl.classList.add("playing");

        ttsSource.onended = () => {
          ttsPlaying = false;
          if (playBtn) {
            playBtn.innerHTML = PLAY_SVG + " Play";
            playBtn.classList.remove("playing");
          }
          if (msgEl) msgEl.classList.remove("playing");
          currentPlayBtn = null;
          currentPlayMsgEl = null;
          unmuteMicAfterPlayback();
        };

        ttsSource.start(0);
      } catch (err) {
        console.error("TTS playback error:", err);
        unmuteMicAfterPlayback();
      }
    }

    function stopTTS() {
      if (ttsSource) {
        try { ttsSource.stop(); } catch {}
        ttsSource = null;
      }
      ttsPlaying = false;
      if (currentPlayBtn) {
        currentPlayBtn.innerHTML = PLAY_SVG + " Play";
        currentPlayBtn.classList.remove("playing");
      }
      if (currentPlayMsgEl) {
        currentPlayMsgEl.classList.remove("playing");
      }
      currentPlayBtn = null;
      currentPlayMsgEl = null;
    }

    function muteMicForPlayback() {
      micWasListening = vadActive;
      if (vadActive) {
        pauseVAD();
        micBtn.classList.add("muted");
      }
    }

    function unmuteMicAfterPlayback() {
      micBtn.classList.remove("muted");
      if (micWasListening && micStream) {
        resumeVAD();
      }
    }

    // ----- Input handlers -----
    newSessionBtn.addEventListener("click", () => {
      send({ type: "session/create" });
    });

    textInput.addEventListener("input", () => {
      const streaming =
        state.detail &&
        (state.detail.status === "streaming" || state.detail.status === "transcribing");
      sendBtn.disabled = !textInput.value.trim() || streaming;
      textInput.style.height = "auto";
      textInput.style.height = Math.min(textInput.scrollHeight, 120) + "px";
    });

    textInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendText();
      }
    });

    sendBtn.addEventListener("click", sendText);

    function sendText() {
      const text = textInput.value.trim();
      if (!text || !state.detail) return;
      send({ type: "message/send_text", content: text });
      textInput.value = "";
      textInput.style.height = "auto";
      sendBtn.disabled = true;
    }

    // ----- Mic device enumeration -----
    async function loadDevices() {
      try {
        await navigator.mediaDevices.getUserMedia({ audio: true }).then(s => s.getTracks().forEach(t => t.stop()));
        const devices = await navigator.mediaDevices.enumerateDevices();
        const audioInputs = devices.filter(d => d.kind === "audioinput");
        micSelect.innerHTML = "";
        audioInputs.forEach((d, i) => {
          const opt = document.createElement("option");
          opt.value = d.deviceId;
          opt.textContent = d.label || `Microphone ${i + 1}`;
          micSelect.appendChild(opt);
        });
      } catch (e) {
        micSelect.innerHTML = "<option>No mic access</option>";
      }
    }

    navigator.mediaDevices.addEventListener("devicechange", loadDevices);
    loadDevices();

    // ----- VAD + Recording -----
    const VAD_THRESHOLD = 0.015;
    const SILENCE_TIMEOUT_MS = 1500;
    const MIN_SPEECH_MS = 400;

    let micStream = null;
    let audioContext = null;
    let analyser = null;
    let mediaRecorder = null;
    let chunks = [];
    let vadActive = false;
    let isSpeaking = false;
    let silenceStart = 0;
    let speechStart = 0;
    let vadRAF = 0;

    micBtn.addEventListener("click", () => {
      if (ttsPlaying) {
        stopTTS();
        unmuteMicAfterPlayback();
        return;
      }
      if (!state.detail) return;
      if (micStream) {
        stopMic();
      } else {
        startMic();
      }
    });

    async function startMic() {
      try {
        const deviceId = micSelect.value || undefined;
        micStream = await navigator.mediaDevices.getUserMedia({
          audio: deviceId ? { deviceId: { exact: deviceId } } : true,
        });

        audioContext = new AudioContext();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048;
        const source = audioContext.createMediaStreamSource(micStream);
        source.connect(analyser);

        vadActive = true;
        isSpeaking = false;
        micBtn.classList.add("listening");
        vadLoop();
      } catch (e) {
        setStatus("Mic access denied: " + e.message, true);
      }
    }

    function stopMic() {
      vadActive = false;
      cancelAnimationFrame(vadRAF);

      if (isSpeaking) {
        finishRecording();
      }

      if (micStream) {
        micStream.getTracks().forEach(t => t.stop());
        micStream = null;
      }
      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }

      micBtn.classList.remove("listening", "speaking", "muted");
      volumeFill.style.width = "0%";
    }

    function pauseVAD() {
      vadActive = false;
      cancelAnimationFrame(vadRAF);
      if (isSpeaking) {
        cancelRecording();
        isSpeaking = false;
        silenceStart = 0;
        micBtn.classList.remove("speaking");
      }
      volumeFill.style.width = "0%";
    }

    function resumeVAD() {
      if (!micStream || !analyser) return;
      vadActive = true;
      isSpeaking = false;
      micBtn.classList.remove("muted");
      micBtn.classList.add("listening");
      vadLoop();
    }

    function vadLoop() {
      if (!vadActive) return;

      const dataArray = new Float32Array(analyser.fftSize);
      analyser.getFloatTimeDomainData(dataArray);

      let rms = 0;
      for (let i = 0; i < dataArray.length; i++) {
        rms += dataArray[i] * dataArray[i];
      }
      rms = Math.sqrt(rms / dataArray.length);

      const pct = Math.min(rms / 0.1, 1) * 100;
      volumeFill.style.width = pct + "%";

      const now = Date.now();

      if (rms > VAD_THRESHOLD) {
        if (!isSpeaking) {
          isSpeaking = true;
          speechStart = now;
          startRecording();
          micBtn.classList.add("speaking");
        }
        silenceStart = 0;
      } else if (isSpeaking) {
        if (silenceStart === 0) {
          silenceStart = now;
        } else if (now - silenceStart > SILENCE_TIMEOUT_MS) {
          const duration = now - speechStart;
          if (duration > MIN_SPEECH_MS) {
            finishRecording();
          } else {
            cancelRecording();
          }
          isSpeaking = false;
          silenceStart = 0;
          micBtn.classList.remove("speaking");
        }
      }

      vadRAF = requestAnimationFrame(vadLoop);
    }

    function startRecording() {
      chunks = [];
      mediaRecorder = new MediaRecorder(micStream, {
        mimeType: "audio/webm;codecs=opus",
      });
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) chunks.push(e.data);
      };
      mediaRecorder.start(100);
    }

    function finishRecording() {
      if (!mediaRecorder || mediaRecorder.state === "inactive") return;
      mediaRecorder.onstop = () => {
        const blob = new Blob(chunks, { type: "audio/webm" });
        if (blob.size > 0 && ws && ws.readyState === WebSocket.OPEN && state.detail) {
          ws.send(blob);
        }
        chunks = [];
      };
      mediaRecorder.stop();
    }

    function cancelRecording() {
      if (!mediaRecorder || mediaRecorder.state === "inactive") return;
      mediaRecorder.onstop = () => { chunks = []; };
      mediaRecorder.stop();
    }

    // ----- Init -----
    connectWebSocket();
  </script>
</body>
</html>
